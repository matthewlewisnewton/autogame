<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Autogame Live</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <div class="eyebrow">Autogame Live</div>
        <h1>Building the Game</h1>
      </div>
      <div class="top-status">
        <div class="stats-stack" aria-label="Tokens and GPU hours">
          <div id="tokens" class="tokens stats-row" title="Local agents and top-level ticket reviews only">
            <span class="token-label">tokens</span>
            <span class="token-stat"><strong>local</strong> <span id="token-local-count">—</span></span>
            <span class="token-stat"><strong>remote reviews</strong> <span id="token-remote-reviews-count">—</span></span>
            <span class="token-stat token-rate" id="token-qwen-rate" hidden><strong>qwen</strong> <span id="token-qwen-tps">—</span> tok/s</span>
          </div>
          <div id="gpu-hours" class="gpu-hours stats-row" title="Cumulative active GPU time (all cards)">GPU·hr: —</div>
        </div>
        <div id="gpu" class="gpu">GPU: waiting...</div>
        <div id="status" class="status">connecting...</div>
      </div>
    </header>

    <main class="layout">
      <section class="stage">
        <div class="panel-title">
          <span>Game Stage</span>
          <a id="artifact-link" href="#" target="_blank" rel="noreferrer">artifact</a>
        </div>
        <div id="stage-body" class="stage-body">
          <div class="empty">
            Waiting for QA screenshots or a live game server...
          </div>
        </div>
        <div id="stage-meta" class="stage-meta"></div>
      </section>

      <section class="feed">
        <div class="panel-title">
          <span>Agent Cast Feed</span>
          <button id="clear" type="button">clear view</button>
        </div>
        <div id="current" class="current">Waiting for harness activity...</div>
        <div id="events" class="events"></div>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
