# Parallel "gastown" factory configuration — read ONCE at `harness factory`
# startup (build_factory). Edit this file and restart the factory to apply.
#
# A local override at harness/factory.local.yaml (gitignored) merges on top of
# this — use it for machine-specific or experimental tweaks without dirtying the
# repo. If this file is missing/unreadable, the factory falls back to the
# hardcoded DEFAULT_SPECS / DEFAULT_ORDER in harness/dispatch/factory.py.

workers: 6            # concurrent worktree slots / port pairs (game 3000+, vite 5173+)
reserve_qwen: true    # each tick, keep the local GPU (qwen) busy on an easy ticket —
                      # or a medium one when no easy work remains — so it's never idle

# Global assignment priority, CHEAPEST FIRST. The dispatcher walks this order and
# takes the first agent that is eligible for the task, AVAILABLE, and under its
# cap. So qwen (local/free) is preferred wherever eligible, then composer (cheap),
# then the expensive remotes. gpt-5.5 is last, so it only runs when claude is out
# of usage (quota-disabled) or every cheaper agent is saturated.
# claude_fable sits early DELIBERATELY despite cost: it is hard-lane-only, so
# this makes hard tickets PREFER fable-5 xhigh while easy/medium still flow
# cheapest-first (fable is simply ineligible for them).
order: [qwen, claude_fable, composer_write, claude, gpt5_extra_write]

# Per-agent concurrency caps + which difficulties each agent may take.
agents:
  qwen:             { max_concurrency: 1, eligible: [easy, medium] }
  composer_write:   { max_concurrency: 3, eligible: [easy, medium, hard] }
  claude:           { max_concurrency: 2, eligible: [medium, hard] }
  # fable-5 @ xhigh effort — hard tickets only, one at a time (premium reasoning
  # spend on the same Anthropic plan as claude/opus).
  claude_fable:     { max_concurrency: 1, eligible: [hard] }
  gpt5_extra_write: { max_concurrency: 1, eligible: [hard] }
