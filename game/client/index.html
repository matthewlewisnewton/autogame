<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Multiplayer Action Game</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div id="ui">
      <h1>Multiplayer Game</h1>
      <p id="status">Connecting...</p>
      <div id="hp-bar-container">
        <span id="hp-label">HP</span>
        <div id="hp-bar-bg">
          <div id="hp-bar-fill"></div>
        </div>
        <span id="hp-text">100/100</span>
      </div>
      <div id="ms-bar-container">
        <span id="ms-label">MS</span>
        <div id="ms-bar-bg">
          <div id="ms-bar-fill"></div>
        </div>
        <span id="ms-text">100/100</span>
      </div>
      <div id="currency-display">GOLD 0</div>
      <div id="objective-hud" style="display:none;"></div>
    </div>
    <div id="card-hand">
      <div class="card-slot" data-slot-index="0"></div>
      <div class="card-slot" data-slot-index="1"></div>
      <div class="card-slot" data-slot-index="2"></div>
      <div class="card-slot" data-slot-index="3"></div>
    </div>
    <div id="lobby">
      <h2>Lobby</h2>
      <div id="lobby-player-list-wrapper">
        <h3>Players</h3>
        <ul id="lobby-player-list">
          <li class="empty-hint">No players yet</li>
        </ul>
      </div>
      <div id="deck-editor">
        <div id="deck-editor-top">
          <div id="owned-cards-section">
            <h3>Owned Cards</h3>
            <div id="owned-cards-list"></div>
          </div>
          <div id="selected-deck-section">
            <h3>Selected Deck <span id="deck-size-display">0/12</span></h3>
            <div id="selected-deck-list"></div>
          </div>
        </div>
        <div id="deck-error" style="display:none;"></div>
      </div>
      <button id="ready-btn">Ready</button>
    </div>
    <div id="run-summary-overlay" style="display:none;">
      <h2 id="summary-status">Victory!</h2>
      <div id="summary-duration">0s</div>
      <div id="summary-enemies">Enemies defeated: 0</div>
      <div id="summary-currency">Currency collected: 0</div>
      <div id="summary-rewards">
        <div id="summary-rewards-currency"></div>
        <div id="summary-rewards-cards"></div>
      </div>
      <button id="return-to-lobby-btn">Return to Lobby</button>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
