<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Multiplayer Action Game</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div id="ui">
      <h1>Multiplayer Game</h1>
      <p id="status">Connecting...</p>
      <div id="hp-bar-container">
        <span id="hp-label">HP</span>
        <div id="hp-bar-bg">
          <div id="hp-bar-fill"></div>
        </div>
        <span id="hp-text">100/100</span>
      </div>
    </div>
    <div id="card-hand">
      <div class="card-slot" data-slot-index="0"></div>
      <div class="card-slot" data-slot-index="1"></div>
      <div class="card-slot" data-slot-index="2"></div>
      <div class="card-slot" data-slot-index="3"></div>
    </div>
    <div id="lobby">
      <h2>Lobby</h2>
      <div id="lobby-player-list-wrapper">
        <h3>Players</h3>
        <ul id="lobby-player-list">
          <li class="empty-hint">No players yet</li>
        </ul>
      </div>
      <button id="ready-btn">Ready</button>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
