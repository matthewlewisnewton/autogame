name: Deploy to Fly

# Manual-only until a FLY_API_TOKEN repo secret exists and a first deploy has
# been verified by hand. To enable continuous deploy later, add:
#   push:
#     branches: [main]
# (ideally gated behind the lobby-smoke workflow).
on:
  workflow_dispatch:

jobs:
  deploy:
    name: flyctl deploy
    runs-on: ubuntu-latest
    concurrency: deploy-fly
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        working-directory: game
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
